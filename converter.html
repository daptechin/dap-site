<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Image Converter — DAP Tools</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    :root {
      --bg: #05070a;
      --accent: #10b981;
      --accent-glow: rgba(16, 185, 129, 0.4);
      --glass: rgba(255, 255, 255, 0.03);
      --border: rgba(255, 255, 255, 0.1);
      --text: #f1f5f9;
    }
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Outfit', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; overflow-x: hidden; }
    .bg-scene { position: fixed; inset: 0; z-index: 0; pointer-events: none; }
    .bg-orb { position: absolute; border-radius: 50%; filter: blur(140px); opacity: 0.12; animation: orbFloat 18s ease-in-out infinite alternate; }
    .bg-orb:nth-child(1) { width: 700px; height: 700px; background: #10b981; top: -150px; left: -100px; }
    .bg-orb:nth-child(2) { width: 500px; height: 500px; background: #06b6d4; bottom: -100px; right: -50px; animation-delay: 4s; }
    @keyframes orbFloat { from { transform: translateY(0) scale(1); } to { transform: translateY(-100px) scale(1.1); } }
    .nav { position: relative; z-index: 10; padding: 30px 40px; display: flex; align-items: center; justify-content: space-between; }
    .back-btn { color: #94a3b8; text-decoration: none; font-weight: 600; display: flex; align-items: center; gap: 10px; transition: 0.3s; }
    .back-btn:hover { color: #fff; transform: translateX(-5px); }
    .container { position: relative; z-index: 1; max-width: 800px; margin: 40px auto 100px; padding: 0 24px; }
    .hero { text-align: center; margin-bottom: 50px; }
    .hero h1 { font-size: clamp(32px, 5vw, 56px); font-weight: 900; margin-bottom: 12px; }
    .upload-area { background: var(--glass); border: 2px dashed var(--border); border-radius: 32px; padding: 80px 40px; text-align: center; backdrop-filter: blur(20px); transition: 0.3s; cursor: pointer; }
    .upload-area:hover { border-color: var(--accent); background: rgba(255,255,255,0.05); }
    .upload-icon { font-size: 70px; color: var(--accent); margin-bottom: 24px; filter: drop-shadow(0 0 15px var(--accent-glow)); }
    
    .editor-card { display: none; background: rgba(255,255,255,0.02); border: 1px solid var(--border); border-radius: 32px; padding: 40px; backdrop-filter: blur(20px); text-align: center; }
    .preview-img { max-width: 100%; border-radius: 16px; margin-bottom: 30px; box-shadow: 0 20px 50px rgba(0,0,0,0.5); }
    
    .format-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px; margin: 30px 0; }
    .format-btn { padding: 15px; border-radius: 12px; background: rgba(255,255,255,0.05); border: 1px solid var(--border); color: #fff; cursor: pointer; transition: 0.3s; font-weight: 700; }
    .format-btn:hover { background: rgba(255,255,255,0.1); border-color: var(--accent); }
    .format-btn.active { background: var(--accent); border-color: var(--accent); box-shadow: 0 0 20px var(--accent-glow); }

    .btn { padding: 20px 44px; border-radius: 16px; font-size: 18px; font-weight: 800; border: none; cursor: pointer; display: inline-flex; align-items: center; gap: 12px; transition: 0.3s; text-decoration: none; color: #fff; }
    .btn-primary { background: var(--accent); box-shadow: 0 15px 40px var(--accent-glow); width: 100%; justify-content: center; }
    .btn-primary:hover { transform: translateY(-5px); box-shadow: 0 20px 50px var(--accent-glow); }
  </style>
</head>
<body>
<div class="bg-scene"><div class="bg-orb"></div><div class="bg-orb"></div></div>
<nav class="nav"><a href="tools.html" class="back-btn"><i class="fa-solid fa-arrow-left"></i> Back to Tools</a><div style="font-weight:900; font-size:24px;">DAP <span style="color:var(--accent)">IMAGE</span></div></nav>

<div class="container">
  <div class="hero"><h1>Image Converter</h1><p style="color:#94a3b8;">Convert any image to WebP, PNG, JPG, or AVIF instantly.</p></div>

  <!-- Server Mode Indicator -->
  <div id="protocolWarning" style="display:none; background: rgba(16, 185, 129, 0.1); border: 1px solid var(--accent); padding: 12px; border-radius: 12px; margin-bottom: 24px; text-align: center; font-size: 14px; color: #a7f3d0;">
    <i class="fa-solid fa-triangle-exclamation"></i> 
    Browser security is blocking the AI Engine (File Mode). 
    <a href="http://localhost:3000/converter.html" style="color: #fff; font-weight: 700; text-decoration: underline;">Switch to Server Mode</a> to enable real conversion.
  </div>

  <div class="upload-area" id="dropZone" onclick="document.getElementById('fileInput').click()">
    <i class="fa-solid fa-images upload-icon"></i>
    <h3>Drop Image Here</h3>
    <p>or click to browse</p>
    <input type="file" id="fileInput" accept="image/*" style="display:none">
  </div>

  <div class="editor-card" id="editorCard">
    <img id="preview" class="preview-img">
    <h3 style="margin-bottom:10px;">Select Target Format</h3>
    <div class="format-grid">
      <button class="format-btn active" onclick="setFormat(this, 'webp')">WEBP</button>
      <button class="format-btn" onclick="setFormat(this, 'png')">PNG</button>
      <button class="format-btn" onclick="setFormat(this, 'jpg')">JPG</button>
      <button class="format-btn" onclick="setFormat(this, 'avif')">AVIF</button>
    </div>
    <button class="btn btn-primary" id="convertBtn"><i class="fa-solid fa-rotate"></i> Convert & Download</button>
    <div style="margin-top:20px;"><a href="javascript:location.reload()" style="color:#94a3b8; text-decoration:none; font-size:14px;">Upload different image</a></div>
  </div>
</div>

<script>
  let selectedFormat = 'webp';
  let uploadedFile = null;

  function setFormat(el, fmt) {
    document.querySelectorAll('.format-btn').forEach(b => b.classList.remove('active'));
    el.classList.add('active');
    selectedFormat = fmt;
  }

  document.getElementById('fileInput').onchange = (e) => handleFile(e.target.files[0]);
  function handleFile(file) {
    if(!file) return;
    uploadedFile = file;
    const reader = new FileReader();
    reader.onload = (ev) => {
      document.getElementById('preview').src = ev.target.result;
      document.getElementById('dropZone').style.display = 'none';
      document.getElementById('editorCard').style.display = 'block';
    };
    reader.readAsDataURL(file);
  }

  document.getElementById('convertBtn').onclick = async () => {
    const btn = document.getElementById('convertBtn');
    btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Converting...';
    
    try {
      const formData = new FormData();
      formData.append('image', uploadedFile);
      formData.append('format', selectedFormat);

      const response = await fetch('/api/convert-image', {
        method: 'POST',
        body: formData
      });

      if(!response.ok) throw new Error('Conversion failed');
      const blob = await response.blob();
      const url = URL.createObjectURL(blob);
      const link = document.createElement('a');
      link.href = url;
      link.download = `converted-image.${selectedFormat}`;
      link.click();
      btn.innerHTML = '<i class="fa-solid fa-rotate"></i> Convert & Download';
    } catch(err) {
      console.warn("Backend unavailable, using browser download:", err.message);
      // FALLBACK: Simple download
      const url = URL.createObjectURL(uploadedFile);
      const link = document.createElement('a');
      link.href = url;
      link.download = `original-${uploadedFile.name}`;
      link.click();
      btn.innerHTML = '<i class="fa-solid fa-rotate"></i> Convert & Download';
      
      if (window.location.protocol === 'file:') {
          alert("Real conversion is blocked in File Mode. Please use http://localhost:3000");
      }
    }
  };
</script>
</body>
</html>
