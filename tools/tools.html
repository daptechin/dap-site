<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DAP Tools - Deliver Anything Possible</title>
    <link rel="icon" type="image/png" href="../logo.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@500;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../style.css">
</head>
<body>
    <!-- Background elements (Real-time animated) -->
    <div class="bg-grid"></div>
    <div class="glow-container">
        <div class="glow glow-blue"></div>
        <div class="glow glow-purple"></div>
        <div class="glow glow-orange"></div>
    </div>

    <!-- Navigation Header -->
    <header class="tools-header">
        <a href="../index.html" class="back-btn">
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-arrow-left"><path d="m12 19-7-7 7-7"/><path d="M19 12H5"/></svg>
            <span>Back to Home</span>
        </a>
    </header>

    <main class="container tools-container">
        <h1 class="tools-title">DAP TOOLS</h1>
        
        <!-- Search Bar -->
        <div class="search-container">
            <div class="search-wrapper">
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="search-icon"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
                <input type="text" id="search-input" placeholder="Search for a tool..." autocomplete="off">
            </div>
        </div>

        <!-- Tools Grid (Compact rectangular layout) -->
        <div class="tools-grid-compact" id="tools-grid">
            <!-- QR CODE Generator (Open) -->
            <div class="tool-card-compact tool-card-compact-open" onclick="window.location.href='qr-generator/qr-generator.html'" data-title="qr code generation for link qr-code-generator">
                <h3 class="tool-title-compact">QR Code Generation for Link</h3>
            </div>

            <!-- Bar Code Generator (Locked) -->
            <div class="tool-card-compact tool-card-compact-locked" data-title="barcode generator barcode-generator">
                <h3 class="tool-title-compact">Barcode Generator</h3>
                <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lock-indicator"><rect width="18" height="11" x="3" y="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
            </div>
        </div>
    </main>

    <script>
        // Live search filter
        const searchInput = document.getElementById('search-input');
        const cards = document.querySelectorAll('.tool-card-compact');

        searchInput.addEventListener('input', (e) => {
            const query = e.target.value.toLowerCase().trim();
            cards.forEach(card => {
                const title = card.getAttribute('data-title');
                if (title.includes(query)) {
                    card.style.display = 'flex';
                } else {
                    card.style.display = 'none';
                }
            });
        });
    </script>
</body>
</html>
