    </script>
</head>
<body>
    <!-- Background elements (Real-time animated) -->
    <div class="bg-grid"></div>
    <div class="glow-container">
        <div class="glow glow-blue"></div>
        <div class="glow glow-purple"></div>
        <div class="glow glow-orange"></div>
    </div>

    <!-- Navigation Header -->
    <header class="tools-header">
        <a href="../tools.html" class="back-btn">
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-arrow-left"><path d="m12 19-7-7 7-7"/><path d="M19 12H5"/></svg>
            <span>Back to Tools</span>
        </a>
    </header>

    <main class="container generator-container">
        <!-- Generator Card -->
        <div class="generator-card">
            <div class="generator-header">
                <div class="icon-box icon-box-blue">
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="5" height="5" x="3" y="3" rx="1"/><rect width="5" height="5" x="16" y="3" rx="1"/><rect width="5" height="5" x="3" y="16" rx="1"/><path d="M21 16h-3a2 2 0 0 0-2 2v3"/><path d="M21 21v-1a2 2 0 0 0-2-2h-1"/><path d="M10 16H7a2 2 0 0 0-2 2v3"/><path d="M16 10h3a2 2 0 0 0 2-2V5"/><path d="M10 3h3a2 2 0 0 1 2 2v3"/></svg>
                </div>
                <h1 class="generator-title">QR Code Generation for Link</h1>
                <p class="generator-subtitle">Create premium quality QR codes instantly. Handled 100% securely inside your browser.</p>
            </div>

            <div class="generator-body">
                <div class="input-group">
                    <label for="qr-text" class="input-label">Website Link / URL</label>
                    <input type="text" id="qr-text" placeholder="https://www.example.com" class="generator-input">
                </div>

                <div class="action-buttons">
                    <button onclick="generateSecureQR()" class="generator-btn btn-primary-gradient">Generate QR Code</button>
                </div>

                <!-- Display area -->
                <div id="qr-result" class="qr-output-box hidden">
                    <div class="qr-image-wrapper">
                        <!-- Default Canvas element for client-side rendering -->
                        <canvas id="qr-canvas" width="200" height="200"></canvas>
                    </div>
                    <button onclick="downloadQR()" class="generator-btn btn-download">
                        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" x2="12" y1="15" y2="3"/></svg>
                        Download Image
                    </button>
                </div>
            </div>
        </div>
    </main>

    <script>
        let currentQRDataUrl = "";

        function generateSecureQR() {
            const textInput = document.getElementById('qr-text');
            const resultBox = document.getElementById('qr-result');
            const wrapper = document.querySelector('.qr-image-wrapper');
            
            const value = textInput.value.trim();
            if (!value) {
                alert('Please enter a website link / URL.');
                return;
            }

            try {
                // Ensure the canvas element exists (if replaced by fallback earlier)
                let canvas = document.getElementById('qr-canvas');
                if (!canvas) {
                    canvas = document.createElement('canvas');
                    canvas.id = 'qr-canvas';
                    canvas.width = 200;
                    canvas.height = 200;
                    wrapper.innerHTML = '';
                    wrapper.appendChild(canvas);
                }

                // Generate locally inside browser using secure QRious library (No network calls)
                const qr = new QRious({
                    element: canvas,
                    value: value,
                    size: 200,
                    background: '#ffffff',
                    foreground: '#0f172a',
                    level: 'H' // High error correction
                });

                // Get base64 canvas image for download
                currentQRDataUrl = canvas.toDataURL('image/png');
                resultBox.classList.remove('hidden');

            } catch (err) {
                console.warn("Local canvas generation failed. Falling back to secure HTTPS API. Error:", err);
                
                // Fallback to secure HTTPS API
                const size = 200;
                const apiUrl = `https://api.qrserver.com/v1/create-qr-code/?size=${size}x${size}&data=${encodeURIComponent(value)}`;
                
                // Replace canvas with img element for API source
                wrapper.innerHTML = `<img id="qr-img" src="${apiUrl}" alt="QR Code" style="width: 160px; height: 160px; display: block;">`;
                
                const qrImg = document.getElementById('qr-img');
                qrImg.onload = function() {
                    resultBox.classList.remove('hidden');
                    
                    // Pre-fetch blob for secure download
                    fetch(apiUrl)
                        .then(response => response.blob())
                        .then(blob => {
                            currentQRDataUrl = URL.createObjectURL(blob);
                        })
                        .catch(fetchErr => {
                            console.error("Secure download cache failed:", fetchErr);
                            currentQRDataUrl = apiUrl; // Fallback to raw API URL
                        });
                };
            }
        }

        function downloadQR() {
            if (!currentQRDataUrl) {
                alert("Please generate a QR Code first.");
                return;
            }
            const a = document.createElement('a');
            a.href = currentQRDataUrl;
            a.download = 'website_qr.png';
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
        }
    </script>
</body>
</html>
