<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DAP Technologies</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  font-family: 'Segoe UI', sans-serif;
  background: radial-gradient(circle at top, #0f172a, #020617);
  color: white;
  min-height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  padding: 20px;
}

/* Container */
.container {
  text-align: center;
  width: 100%;
  max-width: 900px;
}

/* Heading */
.title {
  font-size: 1.2rem;
  color: #94a3b8;
  margin-bottom: 10px;
}

/* Logo */
.logo {
  font-size: 4rem;
  font-weight: 800;
  background: linear-gradient(90deg, #3b82f6, #a855f7, #ec4899);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  margin-bottom: 40px;
}

/* Cards layout */
.cards {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 20px;
}

/* Card */
.card {
  background: rgba(255,255,255,0.05);
  border-radius: 18px;
  padding: 30px 20px;
  backdrop-filter: blur(10px);
  border: 1px solid rgba(255,255,255,0.1);
  transition: 0.3s;
}

.card:hover {
  transform: translateY(-10px) scale(1.05);
  border-color: #6366f1;
}

/* Letter */
.card h2 {
  font-size: 2.5rem;
  margin-bottom: 10px;
  background: linear-gradient(90deg, #3b82f6, #ec4899);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}

/* Text */
.card p {
  color: #cbd5f5;
  font-size: 0.95rem;
}

/* 🔥 MOBILE RESPONSIVE */
@media (max-width: 768px) {
  .logo {
    font-size: 3rem;
  }

  .cards {
    grid-template-columns: 1fr;
  }

  .card {
    padding: 25px;
  }
}

@media (max-width: 480px) {
  .logo {
    font-size: 2.5rem;
  }

  .title {
    font-size: 1rem;
  }
}
</style>

</head>

<body>

<div class="container">
  <div class="title">Welcome to</div>
  <div class="logo">DAP</div>

  <div class="cards">
    <div class="card">
      <h2>D</h2>
      <p>Deliver</p>
    </div>

    <div class="card">
      <h2>A</h2>
      <p>Anything</p>
    </div>

    <div class="card">
      <h2>P</h2>
      <p>Possible</p>
    </div>
  </div>
</div>

</body>
</html>
