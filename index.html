<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DAP — Deliver Anything Possible</title>
<meta name="description" content="DAP — the ultimate toolkit to Deliver Anything Possible.">
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;800;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<link rel="icon" href="assets/logo.png" type="image/png">
<style>
:root{
  --bg:#05070f;
  --text:#f1f5f9;
  --muted:#94a3b8;
}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
html,body{height:100%;}
body{
  font-family:'Outfit',sans-serif;
  background:var(--bg);
  color:var(--text);
  overflow:hidden;
  display:flex;align-items:center;justify-content:center;
}

/* ── BG ── */
.bg-scene{position:fixed;inset:0;z-index:0;pointer-events:none;}
.bg-orb{position:absolute;border-radius:50%;filter:blur(130px);opacity:0.2;animation:orbF 14s ease-in-out infinite alternate;}
.bg-orb:nth-child(1){width:700px;height:700px;background:#3b82f6;top:-200px;left:-150px;animation-delay:0s;}
.bg-orb:nth-child(2){width:600px;height:600px;background:#8b5cf6;bottom:-150px;right:-120px;animation-delay:4s;}
.bg-orb:nth-child(3){width:450px;height:450px;background:#ec4899;top:30%;left:35%;animation-delay:8s;}
@keyframes orbF{from{transform:translateY(0) scale(1);}to{transform:translateY(-70px) scale(1.15);}}

.grid-overlay{
  position:fixed;inset:0;z-index:0;pointer-events:none;
  background-image:
    linear-gradient(rgba(99,102,241,0.04) 1px,transparent 1px),
    linear-gradient(90deg,rgba(99,102,241,0.04) 1px,transparent 1px);
  background-size:60px 60px;
}
.particles{position:fixed;inset:0;z-index:0;pointer-events:none;}
.particle{position:absolute;width:2px;height:2px;background:#fff;border-radius:50%;opacity:0;animation:pDrift linear infinite;}
@keyframes pDrift{
  0%{opacity:0;transform:translateY(100vh);}
  10%{opacity:0.5;}90%{opacity:0.3;}
  100%{opacity:0;transform:translateY(-10vh) translateX(30px);}
}

/* ── CENTER STAGE ── */
.stage{
  position:relative;z-index:1;
  text-align:center;
  padding:40px 24px;
  max-width:900px;
  width:100%;
}

/* badge */
.badge{
  display:inline-flex;align-items:center;gap:8px;
  padding:7px 20px;border-radius:99px;
  border:1px solid rgba(139,92,246,0.35);
  background:rgba(139,92,246,0.1);
  font-size:12px;font-weight:600;letter-spacing:2px;text-transform:uppercase;
  color:#a78bfa;margin-bottom:32px;
  animation:fadeDown .8s ease both;
}
@keyframes fadeDown{from{opacity:0;transform:translateY(-20px);}to{opacity:1;transform:translateY(0);}}

/* DAP LETTERS */
.dap-row{
  display:flex;align-items:flex-end;justify-content:center;
  gap:clamp(32px,6vw,100px);
  margin-bottom:20px;
}

.letter-block{
  display:flex;flex-direction:column;align-items:center;gap:12px;
  perspective:800px;
  opacity:0;animation:letterIn .8s cubic-bezier(.175,.885,.32,1.275) forwards;
}
.letter-block:nth-child(1){animation-delay:.2s;}
.letter-block:nth-child(2){animation-delay:.4s;}
.letter-block:nth-child(3){animation-delay:.6s;}
@keyframes letterIn{from{opacity:0;transform:translateY(60px) rotateX(-30deg);}to{opacity:1;transform:translateY(0) rotateX(0);}}

/* 3D letter card */
.letter-card{
  position:relative;
  width:clamp(110px,16vw,170px);
  height:clamp(120px,17vw,180px);
  border-radius:28px;
  display:flex;align-items:center;justify-content:center;
  font-size:clamp(72px,11vw,130px);
  font-weight:900;
  line-height:1;
  color:#fff;
  cursor:default;
  transform-style:preserve-3d;
  transition:transform .4s cubic-bezier(.175,.885,.32,1.275),box-shadow .4s;
  box-shadow:0 30px 80px rgba(0,0,0,0.5), 0 0 0 1px rgba(255,255,255,0.07) inset;
}
.letter-card::before{
  content:'';
  position:absolute;inset:0;border-radius:28px;
  background:inherit;
  filter:blur(30px) opacity(0.5);
  z-index:-1;
  transform:translateZ(-20px) translateY(20px) scale(0.9);
}
.letter-card::after{
  content:'';
  position:absolute;inset:0;border-radius:28px;
  background:linear-gradient(135deg,rgba(255,255,255,0.18) 0%,rgba(255,255,255,0) 60%);
  pointer-events:none;
}
.letter-card:hover{transform:translateY(-16px) rotateY(-8deg) scale(1.06);}

.lc-d{background:linear-gradient(145deg,#1d4ed8,#06b6d4);}
.lc-a{background:linear-gradient(145deg,#6d28d9,#ec4899);transform:rotate(-4deg);}
.lc-a:hover{transform:rotate(-4deg) translateY(-16px) rotateY(-8deg) scale(1.06);}
.lc-p{background:linear-gradient(145deg,#b45309,#ef4444);}

/* word label */
.word-label{
  font-size:clamp(14px,2vw,20px);
  font-weight:600;
  color:var(--muted);
  letter-spacing:1px;
  text-transform:uppercase;
}

/* tagline */
.tagline{
  font-size:clamp(15px,2.2vw,22px);
  color:var(--muted);
  max-width:480px;
  margin:0 auto 50px;
  line-height:1.6;
  opacity:0;animation:fadeUp .8s .9s ease forwards;
}
@keyframes fadeUp{from{opacity:0;transform:translateY(20px);}to{opacity:1;transform:translateY(0);}}

/* CTA */
.cta-wrap{
  display:flex;gap:16px;justify-content:center;flex-wrap:wrap;
  opacity:0;animation:fadeUp .8s 1.1s ease forwards;
}
.btn{
  padding:17px 44px;
  border-radius:16px;
  font-size:17px;font-weight:700;font-family:'Outfit',sans-serif;
  border:none;cursor:pointer;
  transition:transform .3s cubic-bezier(.175,.885,.32,1.275), box-shadow .3s;
  display:inline-flex;align-items:center;gap:10px;
  text-decoration:none;
}
.btn-primary{
  background:linear-gradient(135deg,#6366f1,#3b82f6);
  color:#fff;
  box-shadow:0 20px 60px rgba(99,102,241,0.4);
}
.btn-primary:hover{
  transform:translateY(-6px) scale(1.04);
  box-shadow:0 30px 80px rgba(99,102,241,0.55);
}
.btn-ghost{
  background:rgba(255,255,255,0.06);
  color:var(--text);
  border:1px solid rgba(255,255,255,0.12);
  backdrop-filter:blur(10px);
}
.btn-ghost:hover{
  transform:translateY(-6px) scale(1.04);
  background:rgba(255,255,255,0.1);
  box-shadow:0 20px 50px rgba(0,0,0,0.3);
}

/* floating stat chips */
.chips{
  display:flex;justify-content:center;gap:20px;flex-wrap:wrap;
  margin-top:56px;
  opacity:0;animation:fadeUp .8s 1.3s ease forwards;
}
.chip{
  display:flex;align-items:center;gap:8px;
  padding:10px 20px;border-radius:99px;
  background:rgba(255,255,255,0.05);
  border:1px solid rgba(255,255,255,0.08);
  font-size:13px;font-weight:600;color:var(--muted);
  backdrop-filter:blur(10px);
}
.chip i{font-size:14px;}

/* scrollbar */
::-webkit-scrollbar{width:6px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.1);border-radius:99px;}
</style>
<script>
  // Detect if running via file:// and suggest switching to server
  if (window.location.protocol === 'file:') {
    console.warn("Running in local file mode. Real AI tools require the Node server.");
    // Optional: Auto-detect server and alert
    fetch('http://localhost:3000/api/status').then(() => {
       if(confirm("DAP Backend is running! Switch to the server version for real AI tools?")) {
         window.location.href = 'http://localhost:3000/index.html';
       }
    }).catch(() => {});
  }
</script>
</head>
<body>

<div class="bg-scene">
  <div class="bg-orb"></div>
  <div class="bg-orb"></div>
  <div class="bg-orb"></div>
</div>
<div class="grid-overlay"></div>
<div class="particles" id="particles"></div>

<div class="stage">

  <div class="badge"><i class="fa-solid fa-bolt"></i> The Ultimate Toolkit</div>

  <div class="dap-row">
    <div class="letter-block">
      <div class="letter-card lc-d">D</div>
      <div class="word-label">Deliver</div>
    </div>
    <div class="letter-block">
      <div class="letter-card lc-a">A</div>
      <div class="word-label">Anything</div>
    </div>
    <div class="letter-block">
      <div class="letter-card lc-p">P</div>
      <div class="word-label">Possible</div>
    </div>
  </div>

  <p class="tagline">One platform. Infinite power. Every tool you need — crafted for those who create without limits.</p>

  <div class="cta-wrap">
    <button class="btn btn-primary" onclick="window.location.href='tools.html'">
      <i class="fa-solid fa-wand-magic-sparkles"></i> Explore Tools
    </button>
    <button class="btn btn-ghost">
      <i class="fa-solid fa-play"></i> Watch Demo
    </button>
  </div>

  <div class="chips">
    <div class="chip"><i class="fa-solid fa-check" style="color:#10b981;"></i> 6 Powerful Tools</div>
    <div class="chip"><i class="fa-solid fa-bolt" style="color:#f59e0b;"></i> Instant Access</div>
    <div class="chip"><i class="fa-solid fa-lock" style="color:#8b5cf6;"></i> 100% Free</div>
  </div>

</div>

<script>
/* PARTICLES */
(function(){
  const c=document.getElementById('particles');
  for(let i=0;i<50;i++){
    const p=document.createElement('div');
    p.className='particle';
    p.style.cssText=`left:${Math.random()*100}%;animation-duration:${10+Math.random()*14}s;animation-delay:${Math.random()*14}s;width:${1+Math.random()*2}px;height:${1+Math.random()*2}px;`;
    c.appendChild(p);
  }
})();

/* 3D tilt on letter cards */
document.querySelectorAll('.letter-card').forEach(card=>{
  card.addEventListener('mousemove',e=>{
    const r=card.getBoundingClientRect();
    const x=(e.clientX-r.left)/r.width-0.5;
    const y=(e.clientY-r.top)/r.height-0.5;
    const rot=card.classList.contains('lc-a')?'-4deg':'0deg';
    card.style.transform=`rotate(${rot}) rotateY(${x*22}deg) rotateX(${-y*18}deg) translateY(-12px) scale(1.06)`;
  });
  card.addEventListener('mouseleave',()=>{
    const rot=card.classList.contains('lc-a')?'rotate(-4deg)':'';
    card.style.transform=rot;
  });
});
</script>
</body>
</html>
